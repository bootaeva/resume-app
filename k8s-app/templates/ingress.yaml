{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Values.ingress.name }}-ingress"
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.host | quote }}
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: "{{ .Values.ingress.backendService.name }}-service"
                port:
                  number: {{ .Values.ingress.backendService.port }}
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: "{{ .Values.ingress.frontendService.name }}-service"
                port:
                  number: {{ .Values.ingress.frontendService.port }}
{{- end }}